<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
    <title id="title">COLORRISE icon</title>
    <desc id="desc">A colorful grid with a bright territory marker.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#101528"/>
            <stop offset="1" stop-color="#211246"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="512" height="512" rx="112" fill="url(#bg)"/>
    <g transform="translate(76 76)">
        <rect x="0" y="0" width="104" height="104" rx="24" fill="#ff595e"/>
        <rect x="128" y="0" width="104" height="104" rx="24" fill="#ffca3a"/>
        <rect x="256" y="0" width="104" height="104" rx="24" fill="#8ac926"/>
        <rect x="0" y="128" width="104" height="104" rx="24" fill="#1982c4"/>
        <rect x="128" y="128" width="104" height="104" rx="24" fill="#6a4c93"/>
        <rect x="256" y="128" width="104" height="104" rx="24" fill="#f15bb5"/>
        <rect x="0" y="256" width="104" height="104" rx="24" fill="#8ac926"/>
        <rect x="128" y="256" width="104" height="104" rx="24" fill="#1982c4"/>
        <rect x="256" y="256" width="104" height="104" rx="24" fill="#ff595e"/>
    </g>
    <circle cx="256" cy="256" r="76" fill="none" stroke="#fff" stroke-width="24" filter="url(#glow)"/>
    <path d="M217 259l28 28 56-67" fill="none" stroke="#fff" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
