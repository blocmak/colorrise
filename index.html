<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#101528">
    <meta name="description" content="COLORRISE PWA prototype: захватывай территорию выбором цветов.">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <title>COLORRISE · PWA prototype</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0d1020;
            --panel: rgba(18, 24, 45, 0.9);
            --text: #f8fbff;
            --muted: #9ba9c9;
            --accent: #66e3ff;
            --radius: 22px;
            --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            --safe-top: max(10px, env(safe-area-inset-top));
            --safe-bottom: max(10px, env(safe-area-inset-bottom));
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            overflow: hidden;
            background:
                radial-gradient(circle at top left, rgba(102, 227, 255, 0.24), transparent 32rem),
                radial-gradient(circle at bottom right, rgba(255, 107, 138, 0.22), transparent 30rem),
                linear-gradient(135deg, #090d1a 0%, #101528 52%, #17113a 100%);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            touch-action: manipulation;
        }

        button {
            border: 0;
            color: inherit;
            font: inherit;
            cursor: pointer;
        }

        .app {
            display: grid;
            grid-template-rows: 58px minmax(0, 1fr) 72px;
            gap: clamp(8px, 1.6vh, 16px);
            width: min(980px, 100%);
            height: 100dvh;
            margin: 0 auto;
            padding: var(--safe-top) clamp(10px, 2vw, 18px) var(--safe-bottom);
        }

        .score-track,
        .bottom-bar {
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: var(--radius);
            background: rgba(2, 6, 17, 0.5);
            box-shadow: var(--shadow);
            overflow: hidden;
            backdrop-filter: blur(18px);
        }

        .score-track {
            position: relative;
            display: flex;
            align-items: stretch;
            min-width: 0;
        }

        .score-segment {
            position: relative;
            display: grid;
            place-items: center;
            width: var(--score-width);
            height: 100%;
            min-width: 0;
            background: var(--player-color);
            box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.22);
            transition: width 180ms ease, background 160ms ease;
        }

        .score-segment.robot {
            margin-left: auto;
        }

        .score-segment span {
            max-width: 100%;
            padding: 0 6px;
            overflow: hidden;
            color: #07101e;
            font-size: clamp(0.86rem, 3vw, 1.12rem);
            font-weight: 950;
            line-height: 1;
            text-align: center;
            text-shadow: 0 1px 12px rgba(255, 255, 255, 0.44);
            white-space: nowrap;
        }

        .board-stage {
            display: grid;
            min-height: 0;
            place-items: center;
        }

        .board-wrap {
            aspect-ratio: 1;
            width: min(100%, calc(100dvh - 178px), 760px);
            max-height: 100%;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: clamp(2px, 0.45vw, 5px);
            width: 100%;
            height: 100%;
            padding: clamp(5px, 1vw, 9px);
            border-radius: 22px;
            background: rgba(2, 6, 17, 0.62);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
        }

        .cell {
            position: relative;
            min-width: 0;
            border-radius: clamp(7px, 1.1vw, 13px);
            background: var(--cell-color);
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.2),
                inset 0 -10px 18px rgba(0, 0, 0, 0.15);
            transition: transform 140ms ease, box-shadow 140ms ease, background 160ms ease;
        }

        .cell[data-owner="0"] {
            box-shadow:
                inset 0 0 0 3px #ffffff,
                inset 0 -10px 18px rgba(0, 0, 0, 0.18),
                0 0 14px rgba(255, 255, 255, 0.36);
        }

        .cell[data-owner="1"] {
            box-shadow:
                inset 0 0 0 3px rgba(12, 17, 31, 0.86),
                inset 0 -10px 18px rgba(0, 0, 0, 0.2);
        }

        .cell[data-frontier="true"] {
            transform: scale(1.03);
        }

        .cell::after {
            position: absolute;
            inset: 24%;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(7, 10, 22, 0.55);
            color: #fff;
            font-size: clamp(0.62rem, 1.8vw, 0.92rem);
            font-weight: 900;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        .cell[data-owner="0"]::after {
            content: "YOU";
        }

        .cell[data-owner="1"]::after {
            content: "BOT";
        }

        .palette {
            display: grid;
            grid-template-columns: repeat(6, minmax(34px, 1fr));
            gap: clamp(6px, 1.4vw, 10px);
            min-width: 0;
        }

        .color-btn {
            min-height: 48px;
            border-radius: 16px;
            background: var(--choice-color);
            box-shadow:
                inset 0 0 0 2px rgba(255, 255, 255, 0.3),
                0 10px 22px rgba(0, 0, 0, 0.22);
            transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
        }

        .color-btn:hover,
        .color-btn:focus-visible {
            transform: translateY(-2px);
            outline: 3px solid rgba(255, 255, 255, 0.35);
        }

        .color-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        .color-btn:disabled {
            cursor: not-allowed;
            filter: grayscale(0.55);
            opacity: 0.45;
            transform: none;
        }

        .toast {
            position: fixed;
            right: 16px;
            bottom: calc(88px + env(safe-area-inset-bottom));
            max-width: min(420px, calc(100vw - 32px));
            padding: 14px 16px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 18px;
            background: rgba(15, 20, 37, 0.94);
            box-shadow: var(--shadow);
            color: var(--text);
            transform: translateY(18px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 180ms ease, transform 180ms ease;
            z-index: 20;
        }

        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .bottom-bar {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 56px;
            gap: 10px;
            align-items: center;
            padding: 8px;
        }

        .menu-shell {
            position: relative;
            height: 100%;
        }

        .menu-button {
            display: grid;
            width: 100%;
            height: 100%;
            place-items: center;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.12);
            transition: background 120ms ease, transform 120ms ease;
        }

        .menu-button:hover,
        .menu-button:focus-visible {
            background: rgba(255, 255, 255, 0.18);
            outline: none;
        }

        .menu-button:active {
            transform: translateY(1px) scale(0.98);
        }

        .menu-icon,
        .menu-icon::before,
        .menu-icon::after {
            display: block;
            width: 24px;
            height: 3px;
            border-radius: 999px;
            background: #fff;
            content: "";
        }

        .menu-icon {
            position: relative;
        }

        .menu-icon::before,
        .menu-icon::after {
            position: absolute;
            left: 0;
        }

        .menu-icon::before {
            top: -8px;
        }

        .menu-icon::after {
            top: 8px;
        }

        .menu-dropdown {
            position: absolute;
            right: 0;
            bottom: calc(100% + 12px);
            display: grid;
            width: min(220px, calc(100vw - 28px));
            gap: 6px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 20px;
            background: rgba(15, 20, 37, 0.96);
            box-shadow: var(--shadow);
            z-index: 30;
        }

        .menu-dropdown[hidden] {
            display: none;
        }

        .menu-title {
            padding: 6px 8px 10px;
            color: var(--accent);
            font-size: 1rem;
            font-weight: 950;
            letter-spacing: 0.12em;
        }

        .menu-item {
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            text-align: left;
            text-transform: lowercase;
        }

        .menu-item:hover,
        .menu-item:focus-visible {
            background: rgba(255, 255, 255, 0.15);
            outline: none;
        }

        @media (max-width: 520px) {
            .app {
                grid-template-rows: 52px minmax(0, 1fr) 64px;
            }

            .color-btn {
                min-height: 44px;
                border-radius: 13px;
            }

            .cell::after {
                content: "" !important;
            }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="score-track" id="scoreList" aria-label="Скоринг матча">
        </section>

        <section class="board-stage" aria-label="Игровая область">
            <div class="board-wrap">
                <div class="board" id="board" role="grid" aria-label="Поле COLORRISE"></div>
            </div>
        </section>

        <footer class="bottom-bar" aria-label="Панель выбора цвета">
            <div class="palette" id="palette" aria-label="Доступные цвета"></div>
            <div class="menu-shell">
                <button class="menu-button" id="menuButton" type="button" aria-label="Открыть меню" aria-expanded="false">
                    <span class="menu-icon" aria-hidden="true"></span>
                </button>
                <div class="menu-dropdown" id="menuDropdown" hidden>
                    <strong class="menu-title">COLORRISE</strong>
                    <button class="menu-item" id="restartButton" type="button">сначала</button>
                    <button class="menu-item" id="newGameButton" type="button">новая</button>
                    <button class="menu-item" id="menuItemButton" type="button">меню</button>
                </div>
            </div>
        </footer>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
        const BOARD_SIZE = 13;
        const MAX_ROUNDS = 32;
        const STORAGE_KEY = "colorrise-pwa-state-v2";
        const STATS_KEY = "colorwars-pwa-stats-v1";
        const COLORS = [
            "#ff595e",
            "#ffca3a",
            "#8ac926",
            "#1982c4",
            "#6a4c93",
            "#f15bb5"
        ];
        const PLAYERS = [
            { id: 0, name: "Ты", label: "Игрок", color: "#ffffff", start: [0, 0] },
            { id: 1, name: "Робот", label: "Соперник", color: "#66e3ff", start: [BOARD_SIZE - 1, BOARD_SIZE - 1] }
        ];

        const boardEl = document.getElementById("board");
        const paletteEl = document.getElementById("palette");
        const scoreListEl = document.getElementById("scoreList");
        const newGameButton = document.getElementById("newGameButton");
        const restartButton = document.getElementById("restartButton");
        const menuButton = document.getElementById("menuButton");
        const menuDropdown = document.getElementById("menuDropdown");
        const menuItemButton = document.getElementById("menuItemButton");
        const toastEl = document.getElementById("toast");

        let cells = [];
        let initialCells = [];
        let currentRound = 1;
        let gameOver = false;
        let isResolvingAi = false;
        let previousSnapshot = null;
        let toastTimer = 0;
        let stats = loadStats();

        function randomColorIndex() {
            return Math.floor(Math.random() * COLORS.length);
        }

        function cloneCells(source) {
            return source.map((cell) => ({ ...cell }));
        }

        function indexOf(x, y) {
            return y * BOARD_SIZE + x;
        }

        function getCell(x, y, source = cells) {
            if (x < 0 || y < 0 || x >= BOARD_SIZE || y >= BOARD_SIZE) {
                return null;
            }
            return source[indexOf(x, y)];
        }

        function neighborsOf(x, y) {
            return [
                [x + 1, y],
                [x - 1, y],
                [x, y + 1],
                [x, y - 1]
            ].filter(([nx, ny]) => nx >= 0 && ny >= 0 && nx < BOARD_SIZE && ny < BOARD_SIZE);
        }

        function createBoard() {
            const nextCells = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    nextCells.push({
                        x,
                        y,
                        color: randomColorIndex(),
                        owner: -1
                    });
                }
            }

            PLAYERS.forEach((player) => {
                const [sx, sy] = player.start;
                const anchorColor = player.id % COLORS.length;
                const xDirection = sx === 0 ? 1 : -1;
                const yDirection = sy === 0 ? 1 : -1;
                [
                    [sx, sy],
                    [sx + xDirection, sy],
                    [sx, sy + yDirection],
                    [sx + xDirection, sy + yDirection]
                ].forEach(([x, y]) => {
                    const cell = getCell(x, y, nextCells);
                    if (cell) {
                        cell.owner = player.id;
                        cell.color = anchorColor;
                    }
                });
            });

            return nextCells;
        }

        function snapshot() {
            return {
                cells: cloneCells(cells),
                initialCells: cloneCells(initialCells),
                currentRound,
                gameOver
            };
        }

        function restoreSnapshot(saved) {
            if (!saved) {
                return;
            }
            cells = cloneCells(saved.cells);
            initialCells = cloneCells(saved.initialCells || saved.cells);
            currentRound = saved.currentRound;
            gameOver = saved.gameOver;
            previousSnapshot = null;
            isResolvingAi = false;
            saveGame();
            render();
            showToast("Ход отменён. Попробуй другой цвет.");
        }

        function serializeGame() {
            return JSON.stringify({ cells, initialCells, currentRound, gameOver });
        }

        function saveGame() {
            localStorage.setItem(STORAGE_KEY, serializeGame());
        }

        function loadGame() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    return false;
                }
                const saved = JSON.parse(raw);
                if (!Array.isArray(saved.cells) || saved.cells.length !== BOARD_SIZE * BOARD_SIZE) {
                    return false;
                }
                if (saved.cells.some((cell) => Number(cell.owner) >= PLAYERS.length)) {
                    return false;
                }
                cells = saved.cells.map((cell) => ({
                    x: Number(cell.x),
                    y: Number(cell.y),
                    color: Number(cell.color),
                    owner: Number(cell.owner)
                }));
                initialCells = Array.isArray(saved.initialCells) && saved.initialCells.length === BOARD_SIZE * BOARD_SIZE
                    ? saved.initialCells.map((cell) => ({
                        x: Number(cell.x),
                        y: Number(cell.y),
                        color: Number(cell.color),
                        owner: Number(cell.owner)
                    }))
                    : cloneCells(cells);
                currentRound = Number(saved.currentRound) || 1;
                gameOver = Boolean(saved.gameOver);
                return true;
            } catch (error) {
                return false;
            }
        }

        function loadStats() {
            try {
                const raw = localStorage.getItem(STATS_KEY);
                if (!raw) {
                    return { wins: 0, best: 0, games: 0 };
                }
                const parsed = JSON.parse(raw);
                return {
                    wins: Number(parsed.wins) || 0,
                    best: Number(parsed.best) || 0,
                    games: Number(parsed.games) || 0
                };
            } catch (error) {
                return { wins: 0, best: 0, games: 0 };
            }
        }

        function saveStats() {
            localStorage.setItem(STATS_KEY, JSON.stringify(stats));
        }

        function territoryCounts(source = cells) {
            const counts = PLAYERS.map(() => 0);
            source.forEach((cell) => {
                if (cell.owner >= 0 && cell.owner < counts.length) {
                    counts[cell.owner] += 1;
                }
            });
            return counts;
        }

        function playerColor(playerId, source = cells) {
            const owned = source.find((cell) => cell.owner === playerId);
            return owned ? owned.color : playerId % COLORS.length;
        }

        function ownerAt(x, y) {
            const cell = getCell(x, y);
            return cell ? cell.owner : -1;
        }

        function isFrontierCell(cell) {
            if (cell.owner !== -1) {
                return false;
            }
            return neighborsOf(cell.x, cell.y).some(([nx, ny]) => ownerAt(nx, ny) === 0);
        }

        function floodForPlayer(playerId, colorIndex, source = cells) {
            const nextCells = source.map((cell) => ({ ...cell }));
            const queue = [];
            const visited = new Set();
            let captured = 0;

            nextCells.forEach((cell) => {
                if (cell.owner === playerId) {
                    cell.color = colorIndex;
                    queue.push([cell.x, cell.y]);
                    visited.add(indexOf(cell.x, cell.y));
                }
            });

            while (queue.length) {
                const [x, y] = queue.shift();
                neighborsOf(x, y).forEach(([nx, ny]) => {
                    const key = indexOf(nx, ny);
                    if (visited.has(key)) {
                        return;
                    }
                    const neighbor = getCell(nx, ny, nextCells);
                    if (!neighbor || neighbor.color !== colorIndex) {
                        return;
                    }
                    visited.add(key);
                    if (neighbor.owner === playerId) {
                        queue.push([nx, ny]);
                        return;
                    }
                    if (neighbor.owner >= 0) {
                        return;
                    }
                    captured += 1;
                    neighbor.owner = playerId;
                    neighbor.color = colorIndex;
                    queue.push([nx, ny]);
                });
            }

            return { nextCells, captured };
        }

        function legalColorsFor(playerId, source = cells) {
            const blockedColors = new Set(PLAYERS.map((player) => playerColor(player.id, source)));
            return COLORS.map((_, index) => index).filter((index) => !blockedColors.has(index));
        }

        function chooseAiColor(playerId) {
            const legal = legalColorsFor(playerId);
            let bestColor = legal[0];
            let bestScore = -Infinity;

            legal.forEach((colorIndex) => {
                const result = floodForPlayer(playerId, colorIndex);
                const counts = territoryCounts(result.nextCells);
                const score = result.captured + counts[playerId] * 0.04 + Math.random() * 0.25;
                if (score > bestScore) {
                    bestScore = score;
                    bestColor = colorIndex;
                }
            });

            return bestColor;
        }

        function applyMove(playerId, colorIndex) {
            const result = floodForPlayer(playerId, colorIndex);
            cells = result.nextCells;
            return result;
        }

        function handleHumanMove(colorIndex) {
            if (gameOver || isResolvingAi || !legalColorsFor(0).includes(colorIndex)) {
                return;
            }

            previousSnapshot = snapshot();
            const result = applyMove(0, colorIndex);
            render();

            if (checkGameOver()) {
                return;
            }

            const message = result.captured
                ? `Ты захватил ${result.captured} ${pluralize(result.captured, ["клетку", "клетки", "клеток"])}.`
                : "Цвет изменён, но новых клеток рядом не оказалось.";
            showToast(message);
            runAiTurns();
        }

        async function runAiTurns() {
            isResolvingAi = true;
            updatePaletteState();

            for (const player of PLAYERS.slice(1)) {
                if (gameOver) {
                    break;
                }
                await wait(260);
                const colorIndex = chooseAiColor(player.id);
                applyMove(player.id, colorIndex);
                render();
                checkGameOver(false);
            }

            if (!gameOver) {
                currentRound += 1;
                checkGameOver();
            }

            isResolvingAi = false;
            render();
            saveGame();
        }

        function checkGameOver(shouldRender = true) {
            const counts = territoryCounts();
            const claimed = counts.reduce((sum, count) => sum + count, 0);
            const finished = claimed === cells.length || currentRound > MAX_ROUNDS;
            if (!finished) {
                saveGame();
                return false;
            }

            gameOver = true;
            const winnerId = counts
                .map((count, id) => ({ id, count }))
                .sort((a, b) => b.count - a.count)[0].id;
            const playerPercent = Math.round((counts[0] / cells.length) * 100);

            stats.games += 1;
            stats.best = Math.max(stats.best, playerPercent);
            if (winnerId === 0) {
                stats.wins += 1;
            }
            saveStats();
            saveGame();

            const title = winnerId === 0 ? "Победа!" : `Победил ${PLAYERS[winnerId].name}`;
            const text = `Твой результат: ${playerPercent}% территории.`;
            showToast(`${title} ${text}`);

            if (shouldRender) {
                render();
            }
            return true;
        }

        function wait(ms) {
            return new Promise((resolve) => window.setTimeout(resolve, ms));
        }

        function pluralize(value, variants) {
            const mod10 = value % 10;
            const mod100 = value % 100;
            if (mod10 === 1 && mod100 !== 11) {
                return variants[0];
            }
            if (mod10 >= 2 && mod10 <= 4 && (mod100 < 12 || mod100 > 14)) {
                return variants[1];
            }
            return variants[2];
        }

        function renderBoard() {
            const fragment = document.createDocumentFragment();
            cells.forEach((cell) => {
                const tile = document.createElement("div");
                tile.className = "cell";
                tile.setAttribute("role", "gridcell");
                tile.dataset.owner = String(cell.owner);
                tile.dataset.frontier = String(isFrontierCell(cell));
                tile.style.setProperty("--cell-color", COLORS[cell.color]);
                tile.title = cell.owner >= 0
                    ? `${PLAYERS[cell.owner].name}: ${COLORS[cell.color]}`
                    : `Свободная клетка: ${COLORS[cell.color]}`;
                fragment.appendChild(tile);
            });
            boardEl.replaceChildren(fragment);
        }

        function renderScores() {
            const counts = territoryCounts();
            const fragment = document.createDocumentFragment();
            PLAYERS.forEach((player, index) => {
                const count = counts[player.id];
                const percent = Math.round((count / cells.length) * 100);
                const segment = document.createElement("div");
                segment.className = `score-segment ${index === 0 ? "human" : "robot"}`;
                segment.style.setProperty("--player-color", COLORS[playerColor(player.id)]);
                segment.style.setProperty("--score-width", `${percent}%`);
                segment.setAttribute("aria-label", `${player.name}: ${percent}%`);
                segment.innerHTML = `<span>${percent}%</span>`;
                fragment.appendChild(segment);
            });
            scoreListEl.replaceChildren(fragment);
        }

        function renderPalette() {
            const legal = new Set(legalColorsFor(0));
            const fragment = document.createDocumentFragment();
            COLORS.forEach((color, index) => {
                const button = document.createElement("button");
                button.className = "color-btn";
                button.type = "button";
                button.style.setProperty("--choice-color", color);
                button.disabled = gameOver || isResolvingAi || !legal.has(index);
                button.setAttribute("aria-label", `Выбрать цвет ${index + 1}`);
                button.addEventListener("click", () => handleHumanMove(index));
                fragment.appendChild(button);
            });
            paletteEl.replaceChildren(fragment);
        }

        function updatePaletteState() {
            Array.from(paletteEl.children).forEach((button, index) => {
                button.disabled = gameOver || isResolvingAi || !legalColorsFor(0).includes(index);
            });
        }

        function render() {
            renderBoard();
            renderScores();
            renderPalette();
        }

        function showToast(message) {
            window.clearTimeout(toastTimer);
            toastEl.textContent = message;
            toastEl.classList.add("visible");
            toastTimer = window.setTimeout(() => {
                toastEl.classList.remove("visible");
            }, 2600);
        }

        function setFreshBoard() {
            cells = createBoard();
            initialCells = cloneCells(cells);
            currentRound = 1;
            gameOver = false;
            isResolvingAi = false;
            previousSnapshot = null;
        }

        function restartMatch() {
            cells = cloneCells(initialCells);
            currentRound = 1;
            gameOver = false;
            isResolvingAi = false;
            previousSnapshot = null;
            saveGame();
            render();
            showToast("Начали сначала.");
        }

        function startNewGame() {
            setFreshBoard();
            saveGame();
            render();
            showToast("Новая карта готова.");
        }

        function toggleMenu(forceOpen) {
            const shouldOpen = typeof forceOpen === "boolean" ? forceOpen : menuDropdown.hidden;
            menuDropdown.hidden = !shouldOpen;
            menuButton.setAttribute("aria-expanded", String(shouldOpen));
        }

        function registerServiceWorker() {
            if (!("serviceWorker" in navigator)) {
                return;
            }

            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js")
                    .catch(() => {});
            });
        }

        function init() {
            if (!loadGame()) {
                setFreshBoard();
                saveGame();
            }
            render();
            registerServiceWorker();

            restartButton.addEventListener("click", () => {
                toggleMenu(false);
                restartMatch();
            });
            newGameButton.addEventListener("click", () => {
                toggleMenu(false);
                startNewGame();
            });
            menuItemButton.addEventListener("click", () => {
                toggleMenu(false);
                showToast("Меню пока в разработке.");
            });
            menuButton.addEventListener("click", () => toggleMenu());
            document.addEventListener("click", (event) => {
                if (!menuDropdown.hidden && !event.target.closest(".menu-shell")) {
                    toggleMenu(false);
                }
            });
            document.addEventListener("keydown", (event) => {
                if (event.key === "Escape") {
                    toggleMenu(false);
                }
            });
        }

        init();
    </script>
</body>
</html>
